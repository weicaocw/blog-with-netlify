name: build-site
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libs needed if any R package falls back to source compilation
      # (e.g. fs -> libuv). Cheap insurance.
      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libuv1-dev

      # Pin a stable R version with full RSPM binary coverage so packages
      # install as binaries (no source compilation, no missing system libs).
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages and render site
        run: Rscript render.R

      # On a Pull Request: deploy a draft preview and comment the link.
      - name: Deploy preview + comment (PR)
        if: github.event_name == 'pull_request'
        uses: animint/animint-actions/netlify-deploy-comment@main
        with:
          netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify_site_id:    ${{ secrets.NETLIFY_SITE_ID }}
          pat_github_pr:      ${{ secrets.GITHUB_TOKEN }}
          path:               _site
          netlify_url:        caowei-blog.netlify.app

      # On push to main: deploy to the production URL.
      - name: Deploy to production (main)
        if: github.event_name == 'push'
        run: |
          npx --yes netlify-cli deploy --dir=_site --prod \
            --site="${{ secrets.NETLIFY_SITE_ID }}" \
            --auth="${{ secrets.NETLIFY_AUTH_TOKEN }}"
