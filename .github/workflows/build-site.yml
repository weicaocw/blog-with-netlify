name: build-site
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages and render site
        run: Rscript render.R

      - name: Netlify deploy + PR comment
        uses: animint/animint-actions/netlify-deploy-comment@main
        with:
          netlify_auth_token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify_site_id:    ${{ secrets.NETLIFY_SITE_ID }}
          pat_github_pr:      ${{ secrets.GITHUB_TOKEN }}
          path:               _site
          netlify_url:        caowei-blog.netlify.app
